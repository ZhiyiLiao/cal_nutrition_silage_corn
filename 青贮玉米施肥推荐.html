<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青贮玉米测土配方施肥推荐系统 (修正版)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f0f4f8; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 1100px; width: 100%; background: white; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.08); padding: 30px 35px; }
        h1 { font-size: 28px; font-weight: 700; color: #2d3748; display: flex; align-items: center; gap: 10px; }
        .subtitle { color: #718096; font-size: 15px; margin-bottom: 30px; border-left: 4px solid #48bb78; padding-left: 16px; }
        .grid { display: grid; grid-template-columns: 320px 1fr; gap: 30px; }
        @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
        .sidebar { background: #f7fafc; border-radius: 16px; padding: 24px 20px; align-self: start; }
        .sidebar label { display: block; font-weight: 600; font-size: 14px; color: #2d3748; margin-top: 18px; margin-bottom: 5px; }
        .sidebar select, .sidebar input { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 15px; background: white; }
        .btn-calc { width: 100%; padding: 14px; margin-top: 25px; background: #48bb78; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
        .btn-calc:hover { background: #38a169; }
        .results { display: flex; flex-direction: column; gap: 25px; }
        .metric-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        @media (max-width: 600px) { .metric-cards { grid-template-columns: 1fr; } }
        .metric { background: #f7fafc; border-radius: 16px; padding: 20px 18px; text-align: center; border-left: 6px solid #a0aec0; }
        .metric.n { border-left-color: #2b6cb0; }
        .metric.p { border-left-color: #dd6b20; }
        .metric.k { border-left-color: #38a169; }
        .metric .label { font-size: 14px; color: #4a5568; font-weight: 500; }
        .metric .value { font-size: 32px; font-weight: 700; margin: 6px 0 2px; }
        .metric .sub { font-size: 14px; color: #718096; }
        .section-title { font-size: 18px; font-weight: 600; margin: 10px 0 12px 0; color: #2d3748; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; background: #f7fafc; border-radius: 12px; overflow: hidden; }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #edf2f7; font-weight: 600; }
        .chart-container { position: relative; height: 220px; margin-top: 8px; }
        .expander { margin-top: 12px; background: #f7fafc; border-radius: 12px; padding: 0 16px; }
        .expander summary { padding: 14px 0; font-weight: 600; cursor: pointer; }
        .footer { margin-top: 30px; font-size: 13px; color: #a0aec0; text-align: center; border-top: 1px solid #e2e8f0; padding-top: 20px; }
        .error-msg { background: #fed7d7; color: #9b2c2c; padding: 12px 18px; border-radius: 12px; margin-top: 10px; display: none; }
        .error-msg.show { display: block; }
        .log-box { background: #2d3748; color: #e2e8f0; padding: 12px 16px; border-radius: 12px; font-family: monospace; font-size: 13px; max-height: 150px; overflow-y: auto; white-space: pre-wrap; margin-top: 12px; }
        .log-box .log-ok { color: #68d391; }
        .log-box .log-err { color: #fc8181; }
    </style>
</head>
<body>
<div class="container">
    <h1>🌽 青贮玉米测土配方施肥推荐系统</h1>
    <div class="subtitle">依据文献《青贮玉米施肥的理论和技术》2018</div>

    <div class="grid">
        <!-- 输入侧边栏 -->
        <div class="sidebar">
            <label for="region">🌍 选择地区</label>
            <select id="region"></select>

            <label for="soilN">🔬 测土氮 (mg/kg)</label>
            <input type="number" id="soilN" step="0.1" value="72">

            <label for="soilP">🔬 测土磷 (mg/kg)</label>
            <input type="number" id="soilP" step="0.1" value="15">

            <label for="soilK">🔬 测土钾 (mg/kg)</label>
            <input type="number" id="soilK" step="0.1" value="120">

            <label for="targetYield">🎯 目标产量 (t/hm²) <span style="font-weight:400;color:#718096;">(30~120)</span></label>
            <input type="number" id="targetYield" step="1" value="60" min="30" max="120">

            <button class="btn-calc" id="calcBtn">🚀 计算推荐施肥量</button>
            <div id="errorMsg" class="error-msg"></div>
            <div id="logBox" class="log-box"></div>
        </div>

        <!-- 结果展示 -->
        <div class="results">
            <div class="metric-cards">
                <div class="metric n"><div class="label">🌱 氮 (N) 推荐量</div><div class="value" id="nVal">—</div><div class="sub" id="nSub">级别 —</div></div>
                <div class="metric p"><div class="label">🌱 磷 (P₂O₅) 推荐量</div><div class="value" id="pVal">—</div><div class="sub" id="pSub">级别 —</div></div>
                <div class="metric k"><div class="label">🌱 钾 (K₂O) 推荐量</div><div class="value" id="kVal">—</div><div class="sub" id="kSub">级别 —</div></div>
            </div>

            <div>
                <div class="section-title">📊 土壤养分丰缺级别</div>
                <table><thead><tr><th>养分</th><th>测土值</th><th>丰缺级别</th><th>含义</th></tr></thead>
                    <tbody id="levelBody"><tr><td>氮 (N)</td><td>—</td><td>—</td><td>—</td></tr><tr><td>磷 (P₂O₅)</td><td>—</td><td>—</td><td>—</td></tr><tr><td>钾 (K₂O)</td><td>—</td><td>—</td><td>—</td></tr></tbody>
                </table>
            </div>

            <div>
                <div class="section-title">📈 推荐施肥量对比</div>
                <div class="chart-container"><canvas id="fertChart"></canvas></div>
            </div>

            <details class="expander">
                <summary>📖 查看当前地区氮素丰缺阈值参考</summary>
                <table id="thresholdTable"><thead><tr><th>级别</th><th>下限值</th></tr></thead><tbody id="thresholdBody"></tbody></table>
            </details>
        </div>
    </div>
    <div class="footer">数据来源：《青贮玉米施肥的理论和技术》2018 · 纯前端版本 v2.0 (仅青贮)</div>
</div>

<script>
    // ================================================================
    // 1. 数据（已按Excel原始区间正确提取下限）
    //    每个数组长度为7，分别对应级别7~1的下限，null表示-∞
    // ================================================================

    // ----- 氮阈值 (索引0:级别7, 1:级别6, ..., 6:级别1) -----
    const nitrogenThreshold = {
        "吉林东部": [null, null, 93, 131, 185, 261, 368],
        "吉林中部": [null, null, null, 66, 105, 166, 261],
        "吉林西部": [null, 51, 70, 97, 135, null, null],
        "辽宁北部": [null, 72, 93, 120, 154, 198, 254],
        "河套灌区": [null, 0.2, 0.4, 0.6, 0.9, 1.4, 2.2],
        "黄土高原": [null, 23, 36, 56, 88, 140, 221],
        "关中灌区": [null, null, 30, 44, 66, 99, 147],
        "甘肃平凉": [null, 40, 52, 69, 90, 118, 156],
        "黄淮海平原": [null, 34, 46, 62, 83, 112, 150],
        "安徽淮北": [null, 12, 14, 17, 20, 23, 28],
        "陕西安康": [null, 47, 68, 98, 142, 205, null],
        "川中丘陵区": [null, 2, 10, 18, 26, 34, 43],
        "云南": [null, 30, 51, 87, 148, 254, 435],
        "广东": [null, 31, 47, 71, 109, 166, 253]
    };

    // ----- 磷阈值 -----
    const phosphorusThreshold = {
        "吉林东部": [null, null, null, 14, 21, 30, 43],
        "吉林中部": [null, 2, 4, 7, 13, 24, 45],
        "吉林西部": [null, 4, 6, 9, 13, 19, 28],
        "辽宁北部": [null, 2, 4, 8, 15, 30, 58],
        "河套灌区": [null, 2, 3, 6, 11, 24, 49],
        "黄土高原": [null, 2, 4, 8, 16, 32, 64],
        "关中灌区": [null, null, null, null, 13, 29, 66],
        "甘肃平凉": [null, 1.5, 3, 6, 12, 24, 47],
        "黄淮海平原": [null, 3, 5, 8, 13, 20, 32],
        "河南砂姜黑土区": [null, 6, 10, 17, 28, 47, 78],
        "陕西安康": [null, null, null, null, 4, 12, 38],
        "川中丘陵区": [null, null, 1, 2, 6, 24, 103],
        "云南": [null, null, null, 1, 2, 10, 48],
        "广东": [null, 9, 14, 22, 33, 51, 79]
    };

    // ----- 钾阈值 -----
    const potassiumThreshold = {
        "吉林东部": [null, null, null, 40, 58, 84, 122],
        "吉林中部": [null, null, null, 45, 75, 127, 214],
        "吉林西部": [null, null, null, 40, 77, 150, 291],
        "河套灌区": [null, 40, 58, 85, 125, 184, 270],
        "黄土高原": [null, 31, 49, 78, 123, 195, 310],
        "关中灌区": [null, null, null, null, 31, 106, 374],
        "甘肃平凉": [null, 38, 57, 85, 127, 190, 284],
        "黄淮海平原": [null, null, null, 46, 80, 140, 246],
        "安徽淮北": [null, null, null, 69, 90, 117, 153],
        "陕西安康": [null, null, null, 21, 42, 84, 169],
        "川中丘陵区": [null, null, null, 22, 51, 120, 283],
        "云南": [null, null, null, 5, 20, 75, 290],
        "贵州": [null, null, null, 21, 50, 104, 199],
        "广东": [null, 11, 22, 42, 83, 165, 326]
    };

    // ----- 推荐数据（仅青贮）-----
    const nRecData = [
        { yield: 30, level7: 180, level6: 150, level5: 120, level4: 90, level3: 60, level2: 30, level1: 0 },
        { yield: 45, level7: 270, level6: 225, level5: 180, level4: 135, level3: 90, level2: 45, level1: 0 },
        { yield: 60, level7: 360, level6: 300, level5: 240, level4: 180, level3: 120, level2: 60, level1: 0 },
        { yield: 75, level7: 450, level6: 375, level5: 300, level4: 225, level3: 150, level2: 75, level1: 0 },
        { yield: 90, level7: 540, level6: 450, level5: 360, level4: 270, level3: 180, level2: 90, level1: 0 },
        { yield: 105, level7: 630, level6: 525, level5: 420, level4: 315, level3: 210, level2: 105, level1: 0 },
        { yield: 120, level7: 720, level6: 600, level5: 480, level4: 360, level3: 240, level2: 120, level1: 0 }
    ];
    const pRecData = [
        { yield: 30, level7: 135, level6: 113, level5: 90, level4: 68, level3: 45, level2: 23, level1: 0 },
        { yield: 45, level7: 203, level6: 169, level5: 135, level4: 101, level3: 68, level2: 34, level1: 0 },
        { yield: 60, level7: 270, level6: 225, level5: 180, level4: 135, level3: 90, level2: 45, level1: 0 },
        { yield: 75, level7: 338, level6: 281, level5: 225, level4: 169, level3: 113, level2: 56, level1: 0 },
        { yield: 90, level7: 405, level6: 338, level5: 270, level4: 203, level3: 135, level2: 68, level1: 0 },
        { yield: 105, level7: 473, level6: 394, level5: 315, level4: 236, level3: 158, level2: 79, level1: 0 },
        { yield: 120, level7: 540, level6: 450, level5: 360, level4: 270, level3: 180, level2: 90, level1: 0 }
    ];
    const kRecData = [
        { yield: 30, level7: 126, level6: 105, level5: 84, level4: 63, level3: 42, level2: 21, level1: 0 },
        { yield: 45, level7: 189, level6: 158, level5: 126, level4: 95, level3: 63, level2: 32, level1: 0 },
        { yield: 60, level7: 252, level6: 210, level5: 168, level4: 126, level3: 84, level2: 42, level1: 0 },
        { yield: 75, level7: 315, level6: 263, level5: 210, level4: 158, level3: 105, level2: 53, level1: 0 },
        { yield: 90, level7: 378, level6: 315, level5: 252, level4: 189, level3: 126, level2: 63, level1: 0 },
        { yield: 105, level7: 441, level6: 368, level5: 294, level4: 221, level3: 147, level2: 74, level1: 0 },
        { yield: 120, level7: 504, level6: 420, level5: 336, level4: 252, level3: 168, level2: 84, level1: 0 }
    ];

    // 构建查找结构
    function buildRec(recArray) {
        const yields = recArray.map(item => item.yield);
        const levels = {};
        for (let i = 1; i <= 7; i++) {
            const key = '级别' + i;
            levels[key] = recArray.map(item => item['level' + i]);
        }
        return { yields, levels };
    }
    const nitrogenRec = buildRec(nRecData);
    const phosphorusRec = buildRec(pRecData);
    const potassiumRec = buildRec(kRecData);

    const levelLabels = ["极低", "很低", "低", "中", "高", "很高", "极高"]; // 级别7~1

    // ================================================================
    // 2. 核心逻辑
    // ================================================================

    function log(msg, isError = false) {
        const box = document.getElementById('logBox');
        const div = document.createElement('div');
        div.textContent = msg;
        div.style.color = isError ? '#fc8181' : '#68d391';
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        console.log(msg);
    }

    function getLevel(region, soilValue, thresholdDict, elemName) {
        if (!thresholdDict.hasOwnProperty(region)) {
            throw new Error(`地区 "${region}" 在 ${elemName} 阈值表中不存在`);
        }
        const bounds = thresholdDict[region]; // [级别7下限, 级别6, ..., 级别1下限]
        // 从级别1到级别7遍历（从高到低）
        for (let idx = 6; idx >= 0; idx--) {
            const lb = bounds[idx];
            if (lb === null || lb === undefined) continue; // 该级别无下限，跳过（仅当所有更高级别都不满足时，最后才匹配）
            if (soilValue >= lb) {
                const level = 7 - idx; // idx=6->1, idx=0->7
                log(`   ${elemName}: soil=${soilValue} >= ${lb} → 级别 ${level}`);
                return level;
            }
        }
        // 如果所有有下限的级别都不满足，则属于最低级别（级别7）
        log(`   ${elemName}: soil=${soilValue} 低于所有级别下限 → 级别 7`);
        return 7;
    }

    function interpolate(x, xp, fp) {
        if (x <= xp[0]) return fp[0];
        if (x >= xp[xp.length-1]) return fp[xp.length-1];
        for (let i = 0; i < xp.length-1; i++) {
            if (xp[i] <= x && x <= xp[i+1]) {
                const slope = (fp[i+1] - fp[i]) / (xp[i+1] - xp[i]);
                return fp[i] + slope * (x - xp[i]);
            }
        }
        return fp[fp.length-1];
    }

    function getRecommendation(recLookup, targetYield, level, elemName) {
        const { yields, levels } = recLookup;
        const levelKey = '级别' + level;
        if (!levels.hasOwnProperty(levelKey)) {
            throw new Error(`级别 ${level} 在 ${elemName} 推荐表中不存在`);
        }
        const fp = levels[levelKey];
        const val = interpolate(targetYield, yields, fp);
        log(`   ${elemName}: 目标产量 ${targetYield} → 插值得 ${val.toFixed(1)}`);
        return val;
    }

    function recommend(region, soilN, soilP, soilK, targetYield) {
        log('===== 开始计算 =====');
        log(`地区: ${region}, 测土N=${soilN}, P=${soilP}, K=${soilK}, 目标=${targetYield}`);

        const nLevel = getLevel(region, soilN, nitrogenThreshold, '氮');
        const pLevel = getLevel(region, soilP, phosphorusThreshold, '磷');
        const kLevel = getLevel(region, soilK, potassiumThreshold, '钾');

        const nRec = getRecommendation(nitrogenRec, targetYield, nLevel, '氮');
        const pRec = getRecommendation(phosphorusRec, targetYield, pLevel, '磷');
        const kRec = getRecommendation(potassiumRec, targetYield, kLevel, '钾');

        log(`结果: N=${nRec.toFixed(1)}, P=${pRec.toFixed(1)}, K=${kRec.toFixed(1)}`);
        log('===== 计算完成 =====');
        return { nRec, pRec, kRec, nLevel, pLevel, kLevel };
    }

    // ================================================================
    // 3. UI交互
    // ================================================================

    function populateRegions() {
        const select = document.getElementById('region');
        const regions = Object.keys(nitrogenThreshold).sort();
        regions.forEach(r => {
            const opt = document.createElement('option');
            opt.value = r;
            opt.textContent = r;
            select.appendChild(opt);
        });
        if (regions.length) select.value = regions[0];
    }

    function updateThresholdTable(region) {
        const tbody = document.getElementById('thresholdBody');
        tbody.innerHTML = '';
        if (!nitrogenThreshold.hasOwnProperty(region)) return;
        const bounds = nitrogenThreshold[region];
        const levelNames = ['级别7','级别6','级别5','级别4','级别3','级别2','级别1'];
        for (let i = 0; i < 7; i++) {
            const tr = document.createElement('tr');
            const td1 = document.createElement('td');
            td1.textContent = levelNames[i];
            const td2 = document.createElement('td');
            const val = bounds[i];
            td2.textContent = (val === null || val === undefined) ? '−∞' : val.toFixed(1);
            tr.appendChild(td1);
            tr.appendChild(td2);
            tbody.appendChild(tr);
        }
    }

    let chartInstance = null;
    function updateChart(n, p, k, region, targetYield) {
        const ctx = document.getElementById('fertChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['N', 'P₂O₅', 'K₂O'],
                datasets: [{
                    label: '推荐施肥量 (kg/hm²)',
                    data: [n, p, k],
                    backgroundColor: ['#2b6cb0','#dd6b20','#38a169'],
                    borderRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    title: { display: true, text: `${region} · 青贮玉米 目标产量 ${targetYield} t/hm²`, font: { size: 14 } }
                },
                scales: { y: { beginAtZero: true, title: { display: true, text: 'kg/hm²' } } }
            }
        });
    }

    function updateResults() {
        const errorDiv = document.getElementById('errorMsg');
        errorDiv.classList.remove('show');
        errorDiv.textContent = '';
        const logBox = document.getElementById('logBox');
        logBox.innerHTML = '';

        try {
            const region = document.getElementById('region').value;
            const soilN = parseFloat(document.getElementById('soilN').value);
            const soilP = parseFloat(document.getElementById('soilP').value);
            const soilK = parseFloat(document.getElementById('soilK').value);
            const targetYield = parseFloat(document.getElementById('targetYield').value);

            if (isNaN(soilN) || isNaN(soilP) || isNaN(soilK) || isNaN(targetYield)) {
                throw new Error('请输入有效的数值');
            }
            if (targetYield < 30 || targetYield > 120) {
                throw new Error('目标产量建议在 30 ~ 120 t/hm² 之间');
            }

            const result = recommend(region, soilN, soilP, soilK, targetYield);

            document.getElementById('nVal').textContent = result.nRec.toFixed(1) + ' kg/hm²';
            document.getElementById('pVal').textContent = result.pRec.toFixed(1) + ' kg/hm²';
            document.getElementById('kVal').textContent = result.kRec.toFixed(1) + ' kg/hm²';

            document.getElementById('nSub').textContent = `级别 ${result.nLevel} (${levelLabels[7 - result.nLevel]})`;
            document.getElementById('pSub').textContent = `级别 ${result.pLevel} (${levelLabels[7 - result.pLevel]})`;
            document.getElementById('kSub').textContent = `级别 ${result.kLevel} (${levelLabels[7 - result.kLevel]})`;

            const tbody = document.getElementById('levelBody');
            tbody.innerHTML = '';
            const rows = [
                ['氮 (N)', soilN, result.nLevel, levelLabels[7 - result.nLevel]],
                ['磷 (P₂O₅)', soilP, result.pLevel, levelLabels[7 - result.pLevel]],
                ['钾 (K₂O)', soilK, result.kLevel, levelLabels[7 - result.kLevel]]
            ];
            rows.forEach(row => {
                const tr = document.createElement('tr');
                row.forEach(cell => {
                    const td = document.createElement('td');
                    td.textContent = typeof cell === 'number' ? cell.toFixed(1) : cell;
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });

            updateChart(result.nRec, result.pRec, result.kRec, region, targetYield);
            updateThresholdTable(region);

        } catch (e) {
            errorDiv.textContent = '❌ ' + e.message;
            errorDiv.classList.add('show');
            log('错误: ' + e.message, true);
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        populateRegions();
        const firstRegion = document.getElementById('region').value;
        updateThresholdTable(firstRegion);
        updateResults();

        document.getElementById('calcBtn').addEventListener('click', updateResults);
        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('change', updateResults);
        });
    });
</script>
</body>
</html>
