<!DOCTYPE html>

        .btn-calc { width: 100%; padding: 14px; margin-top: 25px; background: #48bb78; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
        .btn-calc:hover { background: #38a169; }
        .results { display: flex; flex-direction: column; gap: 25px; }
        .metric-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        @media (max-width: 600px) { .metric-cards { grid-template-columns: 1fr; } }
        .metric { background: #f7fafc; border-radius: 16px; padding: 20px 18px; text-align: center; border-left: 6px solid #a0aec0; }
        .metric.n { border-left-color: #2b6cb0; }
        .metric.p { border-left-color: #dd6b20; }
        .metric.k { border-left-color: #38a169; }
        .metric .label { font-size: 14px; color: #4a5568; font-weight: 500; }
        .metric .value { font-size: 32px; font-weight: 700; margin: 6px 0 2px; }
        .metric .sub { font-size: 14px; color: #718096; }
        .section-title { font-size: 18px; font-weight: 600; margin: 10px 0 12px 0; color: #2d3748; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; background: #f7fafc; border-radius: 12px; overflow: hidden; }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #e2e8f0; }

        .chart-container { position: relative; height: 220px; margin-top: 8px; }
        .expander { margin-top: 12px; background: #f7fafc; border-radius: 12px; padding: 0 16px; }
        .expander summary { padding: 14px 0; font-weight: 600; cursor: pointer; }
        .footer { margin-top: 30px; font-size: 13px; color: #a0aec0; text-align: center; border-top: 1px solid #e2e8f0; padding-top: 20px; }
        .error-msg { background: #fed7d7; color: #9b2c2c; padding: 12px 18px; border-radius: 12px; margin-top: 10px; display: none; }
        .error-msg.show { display: block; }

        .log-box .log-ok { color: #68d391; }
        .log-box .log-err { color: #fc8181; }
    </style>
</head>
<body>
<div class="container">

        </div>
    </div>
    <div class="footer">数据来源：《青贮玉米施肥的理论和技术》2018 · 纯前端 v4.1 (修复缓存错误)</div>
</div>

<script>

    // ----- 钾阈值 -----
    const potassiumThreshold = {

        "吉林西部": [null, null, null, 40, 77, 150, 291],

        "黄淮海平原": [null, null, null, 46, 80, 140, 246],
        "安徽淮北": [null, null, null, 69, 90, 117, 153],

        "贵州": [null, null, null, 21, 50, 104, 199],
        "广东": [null, 11, 22, 42, 83, 165, 326]
    };

    // ----- 推荐数据（氮）按类型分组 -----
    const nRecData = {
        "籽实": [
            { yield: 6, level7: 207, level6: 173, level5: 138, level4: 104, level3: 69, level2: 35, level1: 0 },
            { yield: 7.5, level7: 259, level6: 216, level5: 173, level4: 129, level3: 86, level2: 43, level1: 0 },

            { yield: 10.5, level7: 362, level6: 302, level5: 242, level4: 181, level3: 121, level2: 60, level1: 0 },
            { yield: 12, level7: 414, level6: 345, level5: 276, level4: 207, level3: 138, level2: 69, level1: 0 },
            { yield: 13.5, level7: 466, level6: 388, level5: 311, level4: 233, level3: 155, level2: 78, level1: 0 },
            { yield: 15, level7: 518, level6: 431, level5: 345, level4: 259, level3: 173, level2: 86, level1: 0 }
        ],
        "青贮": [
            { yield: 30, level7: 180, level6: 150, level5: 120, level4: 90, level3: 60, level2: 30, level1: 0 },
            { yield: 45, level7: 270, level6: 225, level5: 180, level4: 135, level3: 90, level2: 45, level1: 0 },
            { yield: 60, level7: 360, level6: 300, level5: 240, level4: 180, level3: 120, level2: 60, level1: 0 },
            { yield: 75, level7: 450, level6: 375, level5: 300, level4: 225, level3: 150, level2: 75, level1: 0 },
            { yield: 90, level7: 540, level6: 450, level5: 360, level4: 270, level3: 180, level2: 90, level1: 0 },
            { yield: 105, level7: 630, level6: 525, level5: 420, level4: 315, level3: 210, level2: 105, level1: 0 },
            { yield: 120, level7: 720, level6: 600, level5: 480, level4: 360, level3: 240, level2: 120, level1: 0 }
        ]
    };

    // ----- 推荐数据（磷）按类型分组 -----
    const pRecData = {
        "籽实": [
            { yield: 6, level7: 144, level6: 120, level5: 96, level4: 72, level3: 48, level2: 24, level1: 0 },
            { yield: 7.5, level7: 180, level6: 150, level5: 120, level4: 90, level3: 60, level2: 30, level1: 0 },
            { yield: 9, level7: 216, level6: 180, level5: 144, level4: 108, level3: 72, level2: 36, level1: 0 },
            { yield: 10.5, level7: 252, level6: 210, level5: 168, level4: 126, level3: 84, level2: 42, level1: 0 },
            { yield: 12, level7: 288, level6: 240, level5: 192, level4: 144, level3: 96, level2: 48, level1: 0 },

            { yield: 15, level7: 360, level6: 300, level5: 240, level4: 180, level3: 120, level2: 60, level1: 0 }
        ],
        "青贮": [
            { yield: 30, level7: 135, level6: 113, level5: 90, level4: 68, level3: 45, level2: 23, level1: 0 },
            { yield: 45, level7: 203, level6: 169, level5: 135, level4: 101, level3: 68, level2: 34, level1: 0 },
            { yield: 60, level7: 270, level6: 225, level5: 180, level4: 135, level3: 90, level2: 45, level1: 0 },
            { yield: 75, level7: 338, level6: 281, level5: 225, level4: 169, level3: 113, level2: 56, level1: 0 },
            { yield: 90, level7: 405, level6: 338, level5: 270, level4: 203, level3: 135, level2: 68, level1: 0 },
            { yield: 105, level7: 473, level6: 394, level5: 315, level4: 236, level3: 158, level2: 79, level1: 0 },
            { yield: 120, level7: 540, level6: 450, level5: 360, level4: 270, level3: 180, level2: 90, level1: 0 }
        ]
    };

    // ----- 推荐数据（钾）按类型分组 -----
    const kRecData = {
        "籽实": [
            { yield: 6, level7: 151, level6: 126, level5: 101, level4: 76, level3: 50, level2: 25, level1: 0 },
            { yield: 7.5, level7: 189, level6: 158, level5: 126, level4: 95, level3: 63, level2: 32, level1: 0 },
            { yield: 9, level7: 227, level6: 189, level5: 151, level4: 113, level3: 76, level2: 38, level1: 0 },
            { yield: 10.5, level7: 265, level6: 221, level5: 176, level4: 132, level3: 88, level2: 44, level1: 0 },
            { yield: 12, level7: 302, level6: 252, level5: 202, level4: 151, level3: 101, level2: 50, level1: 0 },
            { yield: 13.5, level7: 340, level6: 284, level5: 227, level4: 170, level3: 113, level2: 57, level1: 0 },
            { yield: 15, level7: 378, level6: 315, level5: 252, level4: 189, level3: 126, level2: 63, level1: 0 }
        ],
        "青贮": [
            { yield: 30, level7: 126, level6: 105, level5: 84, level4: 63, level3: 42, level2: 21, level1: 0 },
            { yield: 45, level7: 189, level6: 158, level5: 126, level4: 95, level3: 63, level2: 32, level1: 0 },
            { yield: 60, level7: 252, level6: 210, level5: 168, level4: 126, level3: 84, level2: 42, level1: 0 },
            { yield: 75, level7: 315, level6: 263, level5: 210, level4: 158, level3: 105, level2: 53, level1: 0 },
            { yield: 90, level7: 378, level6: 315, level5: 252, level4: 189, level3: 126, level2: 63, level1: 0 },
            { yield: 105, level7: 441, level6: 368, level5: 294, level4: 221, level3: 147, level2: 74, level1: 0 },
            { yield: 120, level7: 504, level6: 420, level5: 336, level4: 252, level3: 168, level2: 84, level1: 0 }
        ]
    };

    // 构建查找结构 (返回 { yields, levels })
    function buildRec(recArray) {
        const yields = recArray.map(item => item.yield);
        const levels = {};
        for (let i = 1; i <= 7; i++) {
            const key = '级别' + i;
            levels[key] = recArray.map(item => item['level' + i]);
        }
        return { yields, levels };
    }

    // 获取指定类型和元素的查找结构（每次重新构建，避免缓存污染）
    function getRecLookup(type, dataObj) {
        return buildRec(dataObj[type]);
    }

    const levelLabels = ["极低", "很低", "低", "中", "高", "很高", "极高"];

    // ================================================================
    // 2. 核心逻辑
    // ================================================================

    // 氮素指标映射
    const nitrogenIndicatorMap = {
        "河套灌区": { name: "全氮", unit: "g/kg" },
        "安徽淮北": { name: "有机质", unit: "g/kg" },
        "川中丘陵区": { name: "有机质", unit: "g/kg" }
    };
    const defaultNitrogen = { name: "碱解氮", unit: "mg/kg" };

    function getNitrogenIndicator(region) {
        return nitrogenIndicatorMap[region] || defaultNitrogen;
    }

    function updateNitrogenLabel(region) {
        const info = getNitrogenIndicator(region);
        document.getElementById('soilNLabel').textContent = '🔬 测土' + info.name + ' (' + info.unit + ')';
    }

    function log(msg, isError = false) {
        const box = document.getElementById('logBox');
        const div = document.createElement('div');
        div.textContent = msg;
        div.style.color = isError ? '#fc8181' : '#68d391';
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        console.log(msg);
    }

    function getLevel(region, soilValue, thresholdDict, elemName) {
        if (!thresholdDict.hasOwnProperty(region)) {
            throw new Error(`地区 "${region}" 在 ${elemName} 阈值表中不存在`);
        }
        const bounds = thresholdDict[region];
        for (let idx = 6; idx >= 0; idx--) {
            const lb = bounds[idx];
            if (lb === null || lb === undefined) continue;
            if (soilValue >= lb) {
                const level = 7 - idx;
                log(`   ${elemName}: soil=${soilValue} >= ${lb} → 级别 ${level}`);
                return level;
            }
        }
        log(`   ${elemName}: soil=${soilValue} 低于所有级别下限 → 级别 7`);
        return 7;
    }

    function interpolate(x, xp, fp) {
        if (x <= xp[0]) return fp[0];
        if (x >= xp[xp.length-1]) return fp[xp.length-1];
        for (let i = 0; i < xp.length-1; i++) {
            if (xp[i] <= x && x <= xp[i+1]) {
                const slope = (fp[i+1] - fp[i]) / (xp[i+1] - xp[i]);
                return fp[i] + slope * (x - xp[i]);
            }
        }
        return fp[fp.length-1];
    }

    function getLevelRecommendation(recLookup, targetYield, level, elemName) {
        const { yields, levels } = recLookup;
        const levelKey = '级别' + level;
        if (!levels.hasOwnProperty(levelKey)) {
            throw new Error(`级别 ${level} 在 ${elemName} 推荐表中不存在`);
        }
        const fp = levels[levelKey];
        return interpolate(targetYield, yields, fp);
    }

    function getInterpolatedRec(region, soilVal, level, targetYield, recLookup, thresholdDict, elemName) {
        if (level === 1) {
            const rec1 = getLevelRecommendation(recLookup, targetYield, 1, elemName);
            log(`   ${elemName}: 级别1（最高），无上级，推荐量 = ${rec1.toFixed(1)}`);
            return rec1;
        }

        const recLower = getLevelRecommendation(recLookup, targetYield, level, elemName);
        const recUpper = getLevelRecommendation(recLookup, targetYield, level - 1, elemName);

        const bounds = thresholdDict[region];
        const idx = 7 - level;
        const lower = bounds[idx];
        const upper = bounds[idx + 1];

        if (lower === null || lower === undefined || upper === null || upper === undefined || !isFinite(lower) || !isFinite(upper) || upper <= lower) {
            log(`   ${elemName}: 级别区间无效（lower=${lower}, upper=${upper}），使用当前级别推荐量 ${recLower.toFixed(1)}`);
            return recLower;
        }

        let ratio = (soilVal - lower) / (upper - lower);
        ratio = Math.max(0, Math.min(1, ratio));
        const interpolated = recLower * (1 - ratio) + recUpper * ratio;
        log(`   ${elemName}: 级别${level}区间 [${lower}, ${upper}], soil=${soilVal}, ratio=${ratio.toFixed(3)}, 插值得 ${interpolated.toFixed(1)}`);
        return interpolated;
    }

    // 主推荐函数
    function recommend(region, soilN, soilP, soilK, targetYieldJinMu, cropType) {
        log('===== 开始计算 =====');
        log(`地区: ${region}, 类型: ${cropType}, 测土N=${soilN}, P=${soilP}, K=${soilK}, 目标=${targetYieldJinMu} 斤/亩`);

        const targetYieldTperHa = targetYieldJinMu * 0.0075;
        log(`目标产量转换: ${targetYieldJinMu} 斤/亩 = ${targetYieldTperHa.toFixed(3)} t/ha`);

        const nLevel = getLevel(region, soilN, nitrogenThreshold, '氮');
        const pLevel = getLevel(region, soilP, phosphorusThreshold, '磷');
        const kLevel = getLevel(region, soilK, potassiumThreshold, '钾');

        // 获取各元素推荐查找结构（每次重新构建）
        const nLookup = getRecLookup(cropType, nRecData);
        const pLookup = getRecLookup(cropType, pRecData);
        const kLookup = getRecLookup(cropType, kRecData);

        const nRec_kg_ha = getInterpolatedRec(region, soilN, nLevel, targetYieldTperHa, nLookup, nitrogenThreshold, '氮');
        const pRec_kg_ha = getInterpolatedRec(region, soilP, pLevel, targetYieldTperHa, pLookup, phosphorusThreshold, '磷');
        const kRec_kg_ha = getInterpolatedRec(region, soilK, kLevel, targetYieldTperHa, kLookup, potassiumThreshold, '钾');

        const nRec = nRec_kg_ha / 15;
        const pRec = pRec_kg_ha / 15;
        const kRec = kRec_kg_ha / 15;

        log(`结果 (kg/亩): N=${nRec.toFixed(2)}, P=${pRec.toFixed(2)}, K=${kRec.toFixed(2)}`);
        log('===== 计算完成 =====');
        return { nRec, pRec, kRec, nLevel, pLevel, kLevel };
    }

    // ================================================================
    // 3. UI交互
    // ================================================================

    function populateRegions() {
        const select = document.getElementById('region');
        const regions = Object.keys(nitrogenThreshold).sort();
        regions.forEach(r => {
            const opt = document.createElement('option');
            opt.value = r;
            opt.textContent = r;
            select.appendChild(opt);
        });
        if (regions.length) select.value = regions[0];
        updateNitrogenLabel(select.value);
    }

    function updateThresholdTable(region) {
        const tbody = document.getElementById('thresholdBody');
        tbody.innerHTML = '';
        if (!nitrogenThreshold.hasOwnProperty(region)) return;
        const bounds = nitrogenThreshold[region];
        const levelNames = ['级别7','级别6','级别5','级别4','级别3','级别2','级别1'];
        for (let i = 0; i < 7; i++) {
            const tr = document.createElement('tr');
            const td1 = document.createElement('td');
            td1.textContent = levelNames[i];
            const td2 = document.createElement('td');
            const val = bounds[i];
            td2.textContent = (val === null || val === undefined) ? '−∞' : val.toFixed(1);
            tr.appendChild(td1);
            tr.appendChild(td2);
            tbody.appendChild(tr);
        }
    }

    let chartInstance = null;
    function updateChart(n, p, k, region, targetYieldJinMu, cropType) {
        const ctx = document.getElementById('fertChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['N', 'P₂O₅', 'K₂O'],
                datasets: [{
                    label: '推荐施肥量 (kg/亩)',
                    data: [n, p, k],
                    backgroundColor: ['#2b6cb0','#dd6b20','#38a169'],
                    borderRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    title: { display: true, text: `${region} · ${cropType}玉米 目标产量 ${targetYieldJinMu} 斤/亩`, font: { size: 14 } }
                },
                scales: { y: { beginAtZero: true, title: { display: true, text: 'kg/亩' } } }
            }
        });
    }

    function updateYieldRangeHint() {
        const cropType = document.getElementById('cropType').value;
        const hint = document.getElementById('yieldRangeHint');
        if (cropType === '青贮') {
            hint.textContent = '(4000~16000 斤/亩)';
        } else {
            hint.textContent = '(800~2000 斤/亩)';
        }
    }

    function updateResults() {
        const errorDiv = document.getElementById('errorMsg');
        errorDiv.classList.remove('show');
        errorDiv.textContent = '';
        const logBox = document.getElementById('logBox');
        logBox.innerHTML = '';

        try {
            const region = document.getElementById('region').value;
            const cropType = document.getElementById('cropType').value;
            const soilN = parseFloat(document.getElementById('soilN').value);
            const soilP = parseFloat(document.getElementById('soilP').value);
            const soilK = parseFloat(document.getElementById('soilK').value);
            const targetYield = parseFloat(document.getElementById('targetYield').value);

            if (isNaN(soilN) || isNaN(soilP) || isNaN(soilK) || isNaN(targetYield)) {
                throw new Error('请输入有效的数值');
            }
            if (targetYield <= 0) {
                throw new Error('目标产量必须大于0');
            }

            const result = recommend(region, soilN, soilP, soilK, targetYield, cropType);

            document.getElementById('nVal').textContent = result.nRec.toFixed(2) + ' kg/亩';
            document.getElementById('pVal').textContent = result.pRec.toFixed(2) + ' kg/亩';
            document.getElementById('kVal').textContent = result.kRec.toFixed(2) + ' kg/亩';

            document.getElementById('nSub').textContent = `级别 ${result.nLevel} (${levelLabels[7 - result.nLevel]})`;
            document.getElementById('pSub').textContent = `级别 ${result.pLevel} (${levelLabels[7 - result.pLevel]})`;
            document.getElementById('kSub').textContent = `级别 ${result.kLevel} (${levelLabels[7 - result.kLevel]})`;

            const tbody = document.getElementById('levelBody');
            tbody.innerHTML = '';
            const rows = [
                ['氮 (N)', soilN, result.nLevel, levelLabels[7 - result.nLevel]],
                ['磷 (P₂O₅)', soilP, result.pLevel, levelLabels[7 - result.pLevel]],
                ['钾 (K₂O)', soilK, result.kLevel, levelLabels[7 - result.kLevel]]
            ];
            rows.forEach(row => {
                const tr = document.createElement('tr');
                row.forEach(cell => {
                    const td = document.createElement('td');
                    td.textContent = typeof cell === 'number' ? cell.toFixed(1) : cell;
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });

            updateChart(result.nRec, result.pRec, result.kRec, region, targetYield, cropType);
            updateThresholdTable(region);

        } catch (e) {
            errorDiv.textContent = '❌ ' + e.message;
            errorDiv.classList.add('show');
            log('错误: ' + e.message, true);
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        populateRegions();
        const firstRegion = document.getElementById('region').value;
        updateThresholdTable(firstRegion);
        updateYieldRangeHint();
        updateResults();

        document.getElementById('calcBtn').addEventListener('click', updateResults);
        document.getElementById('region').addEventListener('change', function() {
            updateNitrogenLabel(this.value);
            updateResults();
        });
        document.getElementById('cropType').addEventListener('change', function() {
            updateYieldRangeHint();
            updateResults();
        });
        document.querySelectorAll('input').forEach(el => {
            el.addEventListener('change', updateResults);
            el.addEventListener('input', updateResults);
        });
    });
</script>
</body>
</html>
